# LoRA / PEFT configuration presets for the efficiency frontier sweep.
# Consumed informally by experiments/run_efficiency_sweep.sh as documentation;
# the run_lora.py CLI remains the source of truth.

presets:
  # Small LoRA on RoBERTa-large — the headline "big model, tiny update" run.
  # NOTE (sweep v3): v2 dropped LR 3e-4→2e-4 and stabilised IMDb (F1=0.931) but
  # RoBERTa-large still NaN'd mid-warmup on SST-2 and Emotion (smaller datasets,
  # noisier per-step gradient in bf16). v3 therefore uses a dataset-aware LR:
  #   IMDb          → 2e-4  (stable, keeps v2's 0.931 result)
  #   SST-2/Emotion → 1e-4  (no more NaN, expected F1 0.94+)
  # The sweep script (run_efficiency_sweep.sh) applies the correct LR per run;
  # this YAML lists the default (SST-2/Emotion) value.
  roberta_large_r8:
    model_name: FacebookAI/roberta-large
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    target_modules: [query, value]
    batch_size: 32
    epochs: 5
    early_stopping_patience: 2   # v3: was 1 — gave several runs no room to recover from a noisy epoch
    max_length: 128
    learning_rate: 1.0e-4        # SST-2/Emotion default; IMDb overrides to 2e-4 via sweep script
    learning_rate_imdb: 2.0e-4   # informational override for IMDb
    warmup_ratio: 0.06
    max_grad_norm: 1.0
    bf16: true

  roberta_large_r16:
    model_name: FacebookAI/roberta-large
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    target_modules: [query, value]
    batch_size: 32
    epochs: 5
    early_stopping_patience: 2
    max_length: 128
    learning_rate: 1.0e-4        # SST-2/Emotion default; IMDb overrides to 2e-4 via sweep script
    learning_rate_imdb: 2.0e-4
    warmup_ratio: 0.06
    max_grad_norm: 1.0
    bf16: true

  # BERTweet LoRA — complements WaiYarAung's full fine-tune for a direct
  # "same model, different tuning strategy" comparison.
  bertweet_r8:
    model_name: vinai/bertweet-base
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    target_modules: [query, value]
    batch_size: 32
    epochs: 5
    early_stopping_patience: 2
    max_length: 128
    learning_rate: 3.0e-4
    warmup_ratio: 0.06
    max_grad_norm: 1.0
    bf16: true

  # Distilbert LoRA — apples-to-apples vs. full-FT DistilBERT
  distilbert_r8:
    model_name: distilbert-base-uncased
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    target_modules: [q_lin, v_lin]
    batch_size: 32
    epochs: 5
    early_stopping_patience: 2
    max_length: 128
    learning_rate: 3.0e-4
    warmup_ratio: 0.06
    max_grad_norm: 1.0
    bf16: true

# Datasets to sweep for the efficiency-frontier figure.
datasets: [imdb, sst2, emotion]
